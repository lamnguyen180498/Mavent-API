services:
  nestjs-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs-api
    restart: unless-stopped
    ports:
      - "3000:3000" # Cổng 3000 trên server trỏ vào 3000 của container
    environment:
      NODE_ENV: production
      DATABASE_URL: ${MONGODB_URI} # Sử dụng biến môi trường để kết nối đến database
    networks:
      - app-network

networks:
  app-network:
    driver: bridge